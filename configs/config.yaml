project_name: layout-aware-document-intelligence-engine
environment: local
debug: false

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  annotations_dir: data/annotations
  experiment_dir: experiments/runs
  artifact_dir: experiments/artifacts
  upload_dir: data/processed/uploads

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  workers: 1
  cors_origins:
    - http://localhost:3000
    - http://localhost:8000
  max_upload_size_mb: 25

ocr:
  backend: tesseract
  language: eng
  min_confidence: 0.50
  tesseract_cmd: null

model:
  layoutlmv3_model_name: microsoft/layoutlmv3-base
  revision: main
  device: cpu
  max_sequence_length: 512
  batch_size: 4

preprocessing:
  target_dpi: 200
  max_image_side: 2048
  grayscale: false

logging:
  level: INFO
  json: true
  service_name: layout-aware-document-intelligence-engine

security:
  allowed_extensions:
    - .pdf
    - .png
    - .jpg
    - .jpeg
    - .tif
    - .tiff
  allowed_content_types:
    - application/pdf
    - image/png
    - image/jpeg
    - image/tiff
  max_pdf_pages: 100
  max_image_pixels: 40000000
  filename_pattern: "[^A-Za-z0-9._-]"
