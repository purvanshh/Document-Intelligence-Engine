version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: document-intelligence-engine:latest
    container_name: die-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../experiments:/app/experiments
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Optional: MLflow tracking server ────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: die-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000
    profiles:
      - mlops   # start only with: docker compose --profile mlops up
